<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan — Detect App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="brand"><i class="bi bi-shield-check"></i> Detect App</div>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="categories.html"><i class="bi bi-tags"></i> Kategori</a></li>
      <li class="nav-item"><a class="nav-link" href="items.html"><i class="bi bi-box"></i> Item</a></li>
      <li class="nav-item"><a class="nav-link" href="upload.html"><i class="bi bi-upload"></i> Upload</a></li>
      <li class="nav-item"><a class="nav-link" href="camera.html"><i class="bi bi-camera"></i> Kamera</a></li>
      <li class="nav-item"><a class="nav-link" href="history.html"><i class="bi bi-clock-history"></i> Riwayat</a></li>
      <li class="nav-item"><a class="nav-link active" href="reports.html"><i class="bi bi-file-earmark-bar-graph"></i> Laporan</a></li>
    </ul>
  </div>
  <div class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="user-info">
      <span id="userName">User</span><div class="avatar" id="userAvatar">U</div>
      <button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
  <div class="content">
    <div class="content-inner">
      <div id="alertContainer"></div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Laporan Deteksi</h4>
        <div class="d-flex gap-2">
          <button class="btn btn-success btn-sm" onclick="exportExcel()" title="Export Excel"><i class="bi bi-file-earmark-excel"></i> Excel</button>
          <button class="btn btn-danger btn-sm" onclick="exportPdf()" title="Export PDF"><i class="bi bi-file-earmark-pdf"></i> PDF</button>
        </div>
      </div>
      <div class="card"><div class="card-body">
        <div class="row mb-3 g-2">
          <div class="col-md-4"><label class="form-label small fw-semibold">Tanggal Mulai</label><input type="date" class="form-control form-control-sm" id="fStart"></div>
          <div class="col-md-4"><label class="form-label small fw-semibold">Tanggal Akhir</label><input type="date" class="form-control form-control-sm" id="fEnd"></div>
          <div class="col-md-4 d-flex align-items-end gap-2">
            <button class="btn btn-outline-primary btn-sm flex-fill" onclick="filterReports()"><i class="bi bi-funnel me-1"></i>Filter</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="resetFilter()"><i class="bi bi-arrow-counterclockwise me-1"></i>Reset</button>
          </div>
        </div>
        <div class="table-responsive"><table id="reportTable" class="table table-striped"><thead><tr><th>ID</th><th>Gambar</th><th>Objek</th><th class="d-none d-sm-table-cell">User</th><th>Tanggal</th></tr></thead><tbody></tbody></table></div>
      </div></div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    requireAuth();
    const user = getCurrentUser();
    if (user) {
      document.getElementById('userName').textContent = user.full_name || user.username;
      document.getElementById('userAvatar').textContent = (user.full_name || user.username || 'U')[0].toUpperCase();
    }
    document.getElementById('sidebarToggle').onclick = function(){ document.getElementById('sidebar').classList.toggle('open'); };

    let dt;

    async function loadReports(start, end) {
      try {
        const data = await api.reports.list(start || '', end || '');
        if (dt) dt.destroy();
        const tbody = document.querySelector('#reportTable tbody');
        tbody.innerHTML = '';
        data.forEach(d => {
          const imgUrl = d.image_url ? API_BASE + d.image_url : '';
          const thumb = imgUrl ? `<img src="${imgUrl}" class="rounded" style="width:50px;height:50px;object-fit:cover">` : '<span class="text-muted">-</span>';
          const badges = (d.detected_objects || []).slice(0, 3).map(o => `<span class="badge bg-primary bg-opacity-10 text-primary me-1">${o.label || o.name || o}</span>`).join('');
          const more = d.detected_objects && d.detected_objects.length > 3 ? `<span class="badge bg-secondary">+${d.detected_objects.length - 3}</span>` : '';
          tbody.innerHTML += `<tr>
            <td class="fw-semibold">#${d.id}</td>
            <td>${thumb}</td>
            <td>${badges}${more}</td>
            <td class="d-none d-sm-table-cell">${d.user || '-'}</td>
            <td>${new Date(d.created_at).toLocaleString('id-ID')}</td>
          </tr>`;
        });
        dt = initDataTable('#reportTable', { order: [[0, 'desc']] });
      } catch(err) { handleApiError(err); }
    }

    window.filterReports = function() {
      const start = document.getElementById('fStart').value;
      const end = document.getElementById('fEnd').value;
      loadReports(start, end);
    };

    window.resetFilter = function() {
      document.getElementById('fStart').value = '';
      document.getElementById('fEnd').value = '';
      loadReports();
    };

    window.exportExcel = function() {
      api.reports.exportExcel(document.getElementById('fStart').value, document.getElementById('fEnd').value);
    };

    window.exportPdf = function() {
      api.reports.exportPdf(document.getElementById('fStart').value, document.getElementById('fEnd').value);
    };

    loadReports();
  </script>
</body>
</html>
