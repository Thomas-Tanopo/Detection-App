<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar — Detect App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:15px;">
        <i class="bi bi-person-plus" style="font-size:2.5rem;color:#50cd89;"></i>
      </div>
      <h2 class="auth-title">Daftar</h2>
      <p class="auth-subtitle">Buat akun baru</p>
      <div id="alertContainer"></div>
      <form id="registerForm" autocomplete="off">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" class="form-control" id="fullName">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn">
          <span id="registerSpinner" class="spinner-border spinner-border-sm d-none"></span> Daftar
        </button>
      </form>
      <div class="auth-footer">
        Sudah punya akun? <a href="login.html">Masuk</a>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    if (isAuthenticated()) { window.location.href = 'dashboard.html'; }
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const spinner = document.getElementById('registerSpinner');
      btn.disabled = true; spinner.classList.remove('d-none');
      try {
        const data = await register({
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          full_name: document.getElementById('fullName').value
        });
        showAlert('Pendaftaran berhasil!', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 300);
      } catch (err) {
        showAlert(err.message || 'Gagal mendaftar', 'danger');
      } finally {
        btn.disabled = false; spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
