<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamera — Detect App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="brand"><i class="bi bi-shield-check"></i> Detect App</div>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="categories.html"><i class="bi bi-tags"></i> Kategori</a></li>
      <li class="nav-item"><a class="nav-link" href="items.html"><i class="bi bi-box"></i> Item</a></li>
      <li class="nav-item"><a class="nav-link" href="upload.html"><i class="bi bi-upload"></i> Upload</a></li>
      <li class="nav-item"><a class="nav-link active" href="camera.html"><i class="bi bi-camera"></i> Kamera</a></li>
      <li class="nav-item"><a class="nav-link" href="history.html"><i class="bi bi-clock-history"></i> Riwayat</a></li>
      <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-file-earmark-bar-graph"></i> Laporan</a></li>
    </ul>
  </div>
  <div class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="user-info">
      <span id="userName">User</span><div class="avatar" id="userAvatar">U</div>
      <button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
  <div class="content">
    <div class="content-inner">
      <div id="alertContainer"></div>
      <h4 class="mb-4">Deteksi Kamera</h4>
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card"><div class="card-body text-center">
            <video id="video" autoplay playsinline></video>
            <div class="mt-3">
              <button class="btn btn-success" id="captureBtn" onclick="captureFrame()"><i class="bi bi-camera-fill"></i> Tangkap & Deteksi</button>
              <button class="btn btn-outline-secondary" onclick="stopCamera()"><i class="bi bi-stop-fill"></i> Hentikan Kamera</button>
            </div>
          </div></div>
        </div>
        <div class="col-lg-6">
          <div class="card"><div class="card-body">
            <h6>Hasil Deteksi</h6>
            <div id="resultArea">
              <p class="text-muted">Aktifkan kamera dan tekan Tangkap & Deteksi.</p>
            </div>
          </div></div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    requireAuth();
    const user = getCurrentUser();
    if (user) {
      document.getElementById('userName').textContent = user.full_name || user.username;
      document.getElementById('userAvatar').textContent = (user.full_name || user.username || 'U')[0].toUpperCase();
    }
    document.getElementById('sidebarToggle').onclick = function(){ document.getElementById('sidebar').classList.toggle('open'); };

    const video = document.getElementById('video');
    let stream = null;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
      } catch(err) {
        showAlert('Tidak dapat mengakses kamera: ' + err.message, 'danger');
      }
    }

    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; video.srcObject = null; }
    }

    async function captureFrame() {
      if (!stream) { await startCamera(); }
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const base64 = canvas.toDataURL('image/jpeg', 0.9);

      const btn = document.getElementById('captureBtn');
      btn.disabled = true;
      try {
        const res = await detectFrame(base64);
        showResult(res);
        showAlert('Deteksi berhasil!', 'success');
      } catch(err) { handleApiError(err); }
      finally { btn.disabled = false; }
    }

    function showResult(res) {
      const area = document.getElementById('resultArea');
      const objects = (res.detected_objects || []).map(o => `<span class="detection-badge">${o.label || o.name || o} (${(o.confidence * 100 || 0).toFixed(1)}%)</span>`).join(' ') || '<span class="text-muted">Tidak ada objek terdeteksi</span>';
      const imgUrl = res.image_url ? `${window.API_BASE}${res.image_url}` : '';
      area.innerHTML = `
        ${imgUrl ? `<div class="detection-result mb-2"><img src="${imgUrl}" class="w-100"></div>` : ''}
        <div><strong>Objek Terdeteksi:</strong></div>
        <div>${objects}</div>
        <p class="mt-2 small text-muted">ID Deteksi: ${res.detection_id}</p>`;
    }

    startCamera();
    window.addEventListener('beforeunload', stopCamera);
  </script>
</body>
</html>
