<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item — Detect App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="brand"><i class="bi bi-shield-check"></i> Detect App</div>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="categories.html"><i class="bi bi-tags"></i> Kategori</a></li>
      <li class="nav-item"><a class="nav-link active" href="items.html"><i class="bi bi-box"></i> Item</a></li>
      <li class="nav-item"><a class="nav-link" href="upload.html"><i class="bi bi-upload"></i> Upload</a></li>
      <li class="nav-item"><a class="nav-link" href="camera.html"><i class="bi bi-camera"></i> Kamera</a></li>
      <li class="nav-item"><a class="nav-link" href="history.html"><i class="bi bi-clock-history"></i> Riwayat</a></li>
      <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-file-earmark-bar-graph"></i> Laporan</a></li>
    </ul>
  </div>
  <div class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="user-info">
      <span id="userName">User</span><div class="avatar" id="userAvatar">U</div>
      <button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
  <div class="content">
    <div class="content-inner">
      <div id="alertContainer"></div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Item</h4>
        <button class="btn btn-success" onclick="openCreateModal()"><i class="bi bi-plus-lg"></i> Tambah</button>
      </div>
      <div class="card"><div class="card-body">
        <div class="table-responsive"><table id="itemTable" class="table table-striped"><thead><tr><th>ID</th><th>Nama</th><th>Deskripsi</th><th>Kategori</th><th>Dibuat</th><th>Aksi</th></tr></thead><tbody></tbody></table></div>
      </div></div>
    </div>
  </div>
  <!-- Modal -->
  <div class="modal fade" id="itemModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Tambah Item</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="itemForm">
          <input type="hidden" id="editId">
          <div class="mb-3"><label class="form-label">Nama</label><input type="text" class="form-control" id="itemName" required></div>
          <div class="mb-3"><label class="form-label">Deskripsi</label><textarea class="form-control" id="itemDescription" rows="3"></textarea></div>
          <div class="mb-3"><label class="form-label">Kategori</label><select class="form-select" id="itemCategory" required></select></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-success" onclick="saveItem()"><span id="saveSpinner" class="spinner-border spinner-border-sm d-none"></span> Simpan</button>
      </div>
    </div></div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="config.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    requireAuth();
    const user = getCurrentUser();
    if (user) {
      document.getElementById('userName').textContent = user.full_name || user.username;
      document.getElementById('userAvatar').textContent = (user.full_name || user.username || 'U')[0].toUpperCase();
    }
    document.getElementById('sidebarToggle').onclick = function(){ document.getElementById('sidebar').classList.toggle('open'); };

    let dt, categories = [];

    async function loadCategories() {
      try { categories = await getCategories(); } catch(e) { categories = []; }
    }

    function populateCategorySelect(selected) {
      const sel = document.getElementById('itemCategory');
      sel.innerHTML = '<option value="">-- Pilih Kategori --</option>';
      categories.forEach(c => { sel.innerHTML += `<option value="${c.id}" ${selected == c.id ? 'selected' : ''}>${c.name}</option>`; });
    }

    async function loadItems() {
      try {
        const data = await getItems();
        if (dt) dt.destroy();
        const tbody = document.querySelector('#itemTable tbody');
        tbody.innerHTML = '';
        data.forEach(it => {
          tbody.innerHTML += `<tr>
            <td>${it.id}</td><td>${it.name}</td><td>${it.description || '-'}</td><td>${it.category_name || '-'}</td><td>${formatDate(it.created_at)}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary" onclick="openEditModal(${it.id})"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${it.id},'${it.name}')"><i class="bi bi-trash"></i></button>
            </td>
          </tr>`;
        });
        dt = initDataTable('#itemTable');
      } catch(err) { handleApiError(err); }
    }

    function openCreateModal() {
      document.getElementById('editId').value = '';
      document.getElementById('modalTitle').textContent = 'Tambah Item';
      document.getElementById('itemName').value = '';
      document.getElementById('itemDescription').value = '';
      populateCategorySelect('');
      showModal('itemModal');
    }

    async function openEditModal(id) {
      document.getElementById('editId').value = id;
      document.getElementById('modalTitle').textContent = 'Edit Item';
      try {
        const it = await getItem(id);
        document.getElementById('itemName').value = it.name;
        document.getElementById('itemDescription').value = it.description || '';
        populateCategorySelect(it.category_id);
        showModal('itemModal');
      } catch(err) { handleApiError(err); }
    }

    async function saveItem() {
      const btn = document.querySelector('#itemModal .btn-success');
      const spinner = document.getElementById('saveSpinner');
      btn.disabled = true; spinner.classList.remove('d-none');
      const id = document.getElementById('editId').value;
      const body = { name: document.getElementById('itemName').value, description: document.getElementById('itemDescription').value, category_id: parseInt(document.getElementById('itemCategory').value) };
      try {
        if (id) { await updateItem(parseInt(id), body); showAlert('Item berhasil diperbarui', 'success'); }
        else { await createItem(body); showAlert('Item berhasil ditambahkan', 'success'); }
        hideModal('itemModal');
        loadItems();
      } catch(err) { handleApiError(err); }
      finally { btn.disabled = false; spinner.classList.add('d-none'); }
    }

    function confirmDelete(id, name) {
      if (confirm(`Hapus item "${name}"?`)) {
        deleteItem(id).then(() => { showAlert('Item berhasil dihapus', 'success'); loadItems(); }).catch(handleApiError);
      }
    }

    async function init() {
      await loadCategories();
      loadItems();
    }
    init();
  </script>
</body>
</html>
