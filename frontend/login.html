<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — Detect App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:15px;">
        <i class="bi bi-shield-check" style="font-size:2.5rem;color:#50cd89;"></i>
      </div>
      <h2 class="auth-title">Masuk</h2>
      <p class="auth-subtitle">Silakan masuk untuk melanjutkan</p>
      <div id="alertContainer"></div>
      <form id="loginForm" autocomplete="off">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="username" placeholder="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span id="loginSpinner" class="spinner-border spinner-border-sm d-none"></span> Masuk
        </button>
      </form>
      <div class="auth-footer">
        Belum punya akun? <a href="register.html">Daftar</a>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    if (isAuthenticated()) { window.location.href = 'dashboard.html'; }
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      btn.disabled = true; spinner.classList.remove('d-none');
      try {
        const data = await login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        showAlert('Berhasil masuk!', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 300);
      } catch (err) {
        showAlert(err.message || 'Gagal masuk, periksa username/password', 'danger');
      } finally {
        btn.disabled = false; spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
