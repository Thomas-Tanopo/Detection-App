{% extends "base.html" %}
{% block title %}Kamera - Detect App{% endblock %}
{% block page_title %}<i class="bi bi-camera me-2"></i>Deteksi via Kamera{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center p-4">
                <div class="camera-container position-relative">
                    <video id="video" class="img-fluid rounded shadow-sm bg-dark" autoplay playsinline
                           style="max-height: 50vh; width: 100%;"></video>
                    <canvas id="canvas" class="d-none"></canvas>
                    <div id="cameraOverlay" class="d-flex align-items-center justify-content-center"
                         style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);border-radius:0.375rem;">
                        <div class="text-center text-white">
                            <i class="bi bi-camera-video-off fs-1 d-block mb-2"></i>
                            <p class="mb-0">Kamera tidak aktif</p>
                        </div>
                    </div>
                </div>

                <div class="mt-3 d-flex justify-content-center gap-2">
                    <button class="btn btn-success" id="startCamera">
                        <i class="bi bi-camera-video me-1"></i>Mulai Kamera
                    </button>
                    <button class="btn btn-danger d-none" id="captureBtn">
                        <i class="bi bi-camera me-1"></i>Ambil Foto
                    </button>
                    <button class="btn btn-secondary d-none" id="stopCamera">
                        <i class="bi bi-stop me-1"></i>Stop
                    </button>
                </div>
            </div>
        </div>

        <div id="resultArea" class="card shadow-sm border-0 mt-4 d-none">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h6 class="mb-0 fw-bold"><i class="bi bi-search me-2"></i>Hasil Deteksi</h6>
                <a href="/detection/history" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-clock-history me-1"></i>Riwayat
                </a>
            </div>
            <div class="card-body text-center">
                <img id="resultImage" class="img-fluid rounded shadow-sm" style="max-height: 450px;">
                <div id="resultList" class="mt-3 text-start"></div>
                <div class="mt-3 d-flex flex-wrap justify-content-center gap-2">
                    <a href="/detection/history" class="btn btn-primary">
                        <i class="bi bi-clock-history me-1"></i>Lihat Riwayat Deteksi
                    </a>
                    <button class="btn btn-outline-secondary" onclick="resetCamera()">
                        <i class="bi bi-camera me-1"></i>Deteksi Lagi
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let stream = null;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('cameraOverlay');
    const startBtn = document.getElementById('startCamera');
    const captureBtn = document.getElementById('captureBtn');
    const stopBtn = document.getElementById('stopCamera');
    const resultArea = document.getElementById('resultArea');
    const resultImage = document.getElementById('resultImage');
    const resultList = document.getElementById('resultList');

    startBtn.onclick = async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            overlay.classList.add('d-none');
            startBtn.classList.add('d-none');
            captureBtn.classList.remove('d-none');
            stopBtn.classList.remove('d-none');
        } catch (err) {
            alert('Tidak dapat mengakses kamera: ' + err.message);
        }
    };

    stopBtn.onclick = () => {
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }
        video.srcObject = null;
        overlay.classList.remove('d-none');
        startBtn.classList.remove('d-none');
        captureBtn.classList.add('d-none');
        stopBtn.classList.add('d-none');
    };

    function resetCamera() {
        resultArea.classList.add('d-none');
        resultImage.src = '';
        resultList.innerHTML = '';
        captureBtn.disabled = false;
        captureBtn.innerHTML = '<i class="bi bi-camera me-1"></i>Ambil Foto';
    }

    captureBtn.onclick = async () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imageData = canvas.toDataURL('image/jpeg');

        captureBtn.disabled = true;
        captureBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Memproses...';

        try {
            const res = await fetch('/detection/detect-frame', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            if (!res.ok) {
                const err = await res.json();
                showAlert(err.error || 'Gagal menyimpan. Login ulang.', 'danger');
                captureBtn.disabled = false;
                captureBtn.innerHTML = '<i class="bi bi-camera me-1"></i>Ambil Foto';
                return;
            }
            const data = await res.json();

            if (data.detection_id) {
                showAlert('Foto berhasil disimpan ke riwayat!', 'success');
            }
            resultImage.src = data.image_url || imageData;
            resultArea.classList.remove('d-none');

            if (data.detected_objects && data.detected_objects.length) {
                let html = '<h6 class="fw-bold">Objek Terdeteksi:</h6><div class="d-flex flex-wrap gap-2">';
                data.detected_objects.forEach(obj => {
                    html += `<span class="badge bg-primary fs-6 px-3 py-2">
                                ${obj.label} <span class="bg-white bg-opacity-25 rounded px-1 ms-1">${(obj.confidence * 100).toFixed(1)}%</span>
                             </span>`;
                });
                html += '</div>';
                resultList.innerHTML = html;
            } else {
                resultList.innerHTML = '<div class="alert alert-info mb-0">Tidak ada objek terdeteksi</div>';
            }
        } catch (err) {
            showAlert('Gagal: ' + err.message + '. Coba login ulang.', 'danger');
        }

        captureBtn.disabled = false;
        captureBtn.innerHTML = '<i class="bi bi-camera me-1"></i>Ambil Foto';
    };
</script>
{% endblock %}
