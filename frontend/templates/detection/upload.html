{% extends "base.html" %}
{% block title %}Upload Gambar - Detect App{% endblock %}
{% block page_title %}<i class="bi bi-upload me-2"></i>Deteksi via Upload Gambar{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center p-4 p-md-5">
                <form id="uploadForm" method="POST" action="/detection/upload" enctype="multipart/form-data">
                    <div class="drop-zone" id="dropZone">
                        <i class="bi bi-cloud-arrow-up-fill fs-1 text-primary"></i>
                        <h5 class="mt-3">Drag & Drop gambar di sini</h5>
                        <p class="text-muted mb-3">atau klik untuk memilih file</p>
                        <input type="file" name="image" id="imageInput" accept="image/*" class="d-none" required>
                        <button type="button" class="btn btn-outline-primary btn-lg" id="selectBtn">
                            <i class="bi bi-folder2-open me-1"></i>Pilih Gambar
                        </button>
                    </div>
                    <div id="previewArea" class="mt-4 d-none">
                        <div class="position-relative d-inline-block">
                            <img id="preview" class="img-fluid rounded shadow-sm" style="max-height: 400px;">
                            <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0 m-2" id="removeBtn">
                                <i class="bi bi-x"></i>
                            </button>
                        </div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary btn-lg w-100 w-sm-auto" id="detectBtn">
                                <i class="bi bi-search me-2"></i>Deteksi Objek
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const dropZone = document.getElementById('dropZone');
    const imageInput = document.getElementById('imageInput');
    const previewArea = document.getElementById('previewArea');
    const preview = document.getElementById('preview');
    const selectBtn = document.getElementById('selectBtn');
    const removeBtn = document.getElementById('removeBtn');
    const uploadForm = document.getElementById('uploadForm');

    selectBtn.onclick = () => imageInput.click();

    imageInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) showPreview(file);
    };

    dropZone.ondragover = (e) => {
        e.preventDefault();
        dropZone.classList.add('drop-zone-active');
    };
    dropZone.ondragleave = () => dropZone.classList.remove('drop-zone-active');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('drop-zone-active');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            imageInput.files = e.dataTransfer.files;
            showPreview(file);
        }
    };

    function showPreview(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            dropZone.classList.add('d-none');
            previewArea.classList.remove('d-none');
        };
        reader.readAsDataURL(file);
    }

    removeBtn.onclick = () => {
        imageInput.value = '';
        preview.src = '';
        previewArea.classList.add('d-none');
        dropZone.classList.remove('d-none');
    };

    uploadForm.onsubmit = (e) => {
        const btn = document.getElementById('detectBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Mendeteksi...';
    };
</script>
{% endblock %}
