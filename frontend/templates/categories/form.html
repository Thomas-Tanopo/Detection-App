{% extends "base.html" %}
{% block title %}{% if category %}Edit{% else %}Tambah{% endif %} Kategori - Detect App{% endblock %}
{% block page_title %}
    <i class="bi bi-tags me-2"></i>{% if category %}Edit{% else %}Tambah{% endif %} Kategori
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="POST" action="{% if category %}/categories/{{ category.id }}/edit{% else %}/categories/create{% endif %}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Kategori <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control form-control-lg" required
                               value="{{ category.name if category else '' }}" placeholder="Masukkan nama kategori">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Deskripsi</label>
                        <textarea name="description" class="form-control" rows="4"
                                  placeholder="Masukkan deskripsi kategori (opsional)">{{ category.description if category else '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/categories" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Kembali
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Simpan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
