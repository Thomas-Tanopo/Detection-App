{% extends "base.html" %}
{% block title %}{% if item %}Edit{% else %}Tambah{% endif %} Objek - Detect App{% endblock %}
{% block page_title %}
    <i class="bi bi-box me-2"></i>{% if item %}Edit{% else %}Tambah{% endif %} Objek
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="POST" action="{% if item %}/items/{{ item.id }}/edit{% else %}/items/create{% endif %}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Objek / Label <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control form-control-lg" required
                               value="{{ item.name if item else '' }}" placeholder="Masukkan nama objek">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Kategori</label>
                        <select name="category_id" class="form-select">
                            <option value="">-- Pilih Kategori --</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if item and item.category_id == cat.id %}selected{% endif %}>
                                {{ cat.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Deskripsi</label>
                        <textarea name="description" class="form-control" rows="4"
                                  placeholder="Masukkan deskripsi objek (opsional)">{{ item.description if item else '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/items" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Kembali
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Simpan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
