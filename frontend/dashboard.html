<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Detect App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="brand"><i class="bi bi-shield-check"></i> Detect App</div>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link active" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="categories.html"><i class="bi bi-tags"></i> Kategori</a></li>
      <li class="nav-item"><a class="nav-link" href="items.html"><i class="bi bi-box"></i> Item</a></li>
      <li class="nav-item"><a class="nav-link" href="upload.html"><i class="bi bi-upload"></i> Upload</a></li>
      <li class="nav-item"><a class="nav-link" href="camera.html"><i class="bi bi-camera"></i> Kamera</a></li>
      <li class="nav-item"><a class="nav-link" href="history.html"><i class="bi bi-clock-history"></i> Riwayat</a></li>
      <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-file-earmark-bar-graph"></i> Laporan</a></li>
    </ul>
  </div>
  <div class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="user-info">
      <span id="userName">User</span>
      <div class="avatar" id="userAvatar">U</div>
      <button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
  <div class="content">
    <div class="content-inner">
      <div id="alertContainer"></div>
      <h4 class="mb-4">Dashboard</h4>
      <div class="row g-3" id="statCards">
        <div class="col-md-3 col-6">
          <div class="card stat-card">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between">
                <div><div class="stat-label">Deteksi Hari Ini</div><div class="stat-value" id="statToday">0</div></div>
                <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-camera"></i></div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between">
                <div><div class="stat-label">Total Deteksi</div><div class="stat-value" id="statTotalDetections">0</div></div>
                <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-bar-chart"></i></div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between">
                <div><div class="stat-label">Total Item</div><div class="stat-value" id="statTotalItems">0</div></div>
                <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-box"></i></div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card stat-card">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between">
                <div><div class="stat-label">Total Kategori</div><div class="stat-value" id="statTotalCategories">0</div></div>
                <div class="stat-icon bg-info bg-opacity-10 text-info"><i class="bi bi-tags"></i></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="row g-3 mt-2">
        <div class="col-lg-8">
          <div class="card"><div class="card-body"><h6 class="card-title">Tren Deteksi (14 Hari)</h6><canvas id="trendChart" height="200"></canvas></div></div>
        </div>
        <div class="col-lg-4">
          <div class="card"><div class="card-body"><h6 class="card-title">Objek Teratas</h6><canvas id="topLabelsChart" height="200"></canvas></div></div>
        </div>
      </div>
      <div class="card mt-3">
        <div class="card-body">
          <h6 class="card-title">Deteksi Terbaru</h6>
          <div class="table-responsive"><table id="recentTable" class="table table-striped"><thead><tr><th>Gambar</th><th>Objek</th><th>Total</th><th>Tanggal</th></tr></thead><tbody></tbody></table></div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    requireAuth();
    const user = getCurrentUser();
    if (user) {
      document.getElementById('userName').textContent = user.full_name || user.username;
      document.getElementById('userAvatar').textContent = (user.full_name || user.username || 'U')[0].toUpperCase();
    }
    document.getElementById('sidebarToggle').onclick = function(){ document.getElementById('sidebar').classList.toggle('open'); };

    let trendChart, topChart;
    async function loadDashboard() {
      try {
        const [stats, trend, topLabels, recent] = await Promise.all([
          getDashboardStats(), getDashboardTrend(), getDashboardTopLabels(), getDashboardRecent()
        ]);
        document.getElementById('statToday').textContent = stats.today_detections ?? 0;
        document.getElementById('statTotalDetections').textContent = stats.total_detections ?? 0;
        document.getElementById('statTotalItems').textContent = stats.total_items ?? 0;
        document.getElementById('statTotalCategories').textContent = stats.total_categories ?? 0;

        if (trendChart) trendChart.destroy();
        if (topChart) topChart.destroy();

        const ctx1 = document.getElementById('trendChart').getContext('2d');
        trendChart = new Chart(ctx1, {
          type: 'line',
          data: { labels: trend.labels || [], datasets: [{ label: 'Deteksi', data: trend.data || [], borderColor: '#50cd89', backgroundColor: 'rgba(80,205,137,0.1)', fill: true, tension: 0.3 }] },
          options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        const ctx2 = document.getElementById('topLabelsChart').getContext('2d');
        const colors = ['#50cd89','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];
        const bgColors = (topLabels.names || []).map((_,i) => colors[i % colors.length]);
        topChart = new Chart(ctx2, {
          type: 'doughnut',
          data: { labels: topLabels.names || [], datasets: [{ data: topLabels.counts || [], backgroundColor: bgColors }] },
          options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
        });

        const tbody = document.querySelector('#recentTable tbody');
        tbody.innerHTML = '';
        (recent || []).forEach(r => {
          const objs = (r.objects || r.detected_objects || []).map(o => `<span class="detection-badge">${o.label || o.name || o}</span>`).join(' ');
          const img = r.image_url ? `<img src="${window.API_BASE}${r.image_url}" class="thumbnail-img" onclick="window.open('${window.API_BASE}${r.image_url}','_blank')">` : '-';
          tbody.innerHTML += `<tr><td>${img}</td><td>${objs}</td><td>${r.total_objects || r.objects?.length || r.detected_objects?.length || 0}</td><td>${formatDate(r.created_at)}</td></tr>`;
        });
        if ($.fn.DataTable.isDataTable('#recentTable')) $('#recentTable').DataTable().destroy();
        initDataTable('#recentTable', { searching: false, pageLength: 5 });
      } catch(err) { handleApiError(err); }
    }
    loadDashboard();
  </script>
</body>
</html>
